<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulb 1.0 Beta</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #c0c0c0; --window-bg: #ffffff; --title-active: #000080; --title-inactive: #808080;
            --title-text: #ffffff; --button-face: #c0c0c0; --button-highlight: #ffffff; --button-shadow: #808080;
            --button-dark-shadow: #000000; --text: #000000; --desktop-bg: #008080; --menu-bg: #ffffff;
            --menu-highlight: #000080; --menu-highlight-text: #ffffff; --scrollbar-bg: #c0c0c0;
            --border-3d-outer: #dfdfdf; --border-3d-inner: #808080; --font-size: 12px; --icon-size: 32px;
            --window-animation: none; --cursor-style: default; --wallpaper-tile: none; --wallpaper-position: center;
            --wallpaper-size: auto; --wallpaper-url: none; --desktop-override: var(--desktop-bg); --watermark-opacity: 1.0;
        }
        [data-theme="classic"] { --bg: #c0c0c0; --window-bg: #ffffff; --title-active: #000080; --title-inactive: #808080; --desktop-bg: #008080; --button-face: #c0c0c0; }
        [data-theme="ocean"] { --bg: #b0c4de; --window-bg: #f0f8ff; --title-active: #1a5276; --title-inactive: #7faac4; --desktop-bg: #2c3e50; --button-face: #b0c4de; --menu-highlight: #1a5276; }
        [data-theme="forest"] { --bg: #c8d6af; --window-bg: #f5faf0; --title-active: #2d5016; --title-inactive: #8aa878; --desktop-bg: #3b5323; --button-face: #c8d6af; --menu-highlight: #2d5016; }
        [data-theme="retro"] { --bg: #e8d5b7; --window-bg: #fdf5e6; --title-active: #8b6914; --title-inactive: #c4a86a; --desktop-bg: #d4a853; --button-face: #e8d5b7; --menu-highlight: #8b6914; }
        [data-theme="midnight"] { --bg: #2a2a2a; --window-bg: #1a1a1a; --title-active: #4a4a8a; --title-inactive: #3a3a3a; --title-text: #cccccc; --text: #cccccc; --desktop-bg: #0a0a0a; --button-face: #3a3a3a; --button-highlight: #555; --button-shadow: #111; --button-dark-shadow: #000; --menu-bg: #2a2a2a; --menu-highlight: #4a4a8a; --scrollbar-bg: #3a3a3a; --border-3d-outer: #444; --border-3d-inner: #111; }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', 'MS Sans Serif', sans-serif; font-size: var(--font-size); background: var(--desktop-override); color: var(--text); cursor: var(--cursor-style); overflow: hidden; height: 100vh; width: 100vw; user-select: none; -webkit-user-select: none; image-rendering: auto; }
        #desktop { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: var(--desktop-override); background-image: var(--wallpaper-url); background-repeat: var(--wallpaper-tile); background-position: var(--wallpaper-position); background-size: var(--wallpaper-size); z-index: 0; }
        #watermark { position: fixed; bottom: 12px; right: 16px; font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.95); text-shadow: 1px 1px 3px rgba(0,0,0,0.7); z-index: 1; opacity: var(--watermark-opacity); pointer-events: none; letter-spacing: 0.5px; display: block; }
        [data-theme="midnight"] #watermark { color: rgba(220,220,220,0.95); }
        #shutdown-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; color: #c0c0c0; z-index: 99999; display: none; flex-direction: column; align-items: center; justify-content: center; font-family: 'Inter', sans-serif; text-align: center; padding: 20px; }
        #shutdown-overlay.active { display: flex; }
        #shutdown-overlay .shutdown-logo { font-size: 48px; font-weight: bold; color: #ffcc00; margin-bottom: 20px; text-shadow: 0 0 20px #ffcc00; }
        #shutdown-overlay .shutdown-message { font-size: 20px; margin: 20px 0; color: #ffffff; }
        #shutdown-overlay .shutdown-sub { font-size: 14px; color: #aaaaaa; margin-bottom: 30px; }
        #minimized-container { position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%); display: flex; gap: 6px; z-index: 400; padding: 4px 8px; background: rgba(0,0,0,0.1); border-radius: 6px; backdrop-filter: blur(2px); flex-wrap: wrap; justify-content: center; pointer-events: none; }
        #minimized-container:empty { display: none; }
        .minimized-icon { width: 36px; height: 36px; background: var(--button-face); border: 2px solid; border-color: var(--button-highlight) var(--button-shadow) var(--button-shadow) var(--button-highlight); cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; pointer-events: auto; box-shadow: 1px 1px 3px rgba(0,0,0,0.3); transition: transform 0.1s ease; color: var(--text); border-radius: 2px; }
        .minimized-icon:hover { transform: scale(1.08); }
        .minimized-icon:active { border-color: var(--button-shadow) var(--button-highlight) var(--button-highlight) var(--button-shadow); }
        [data-theme="midnight"] #minimized-container { background: rgba(255,255,255,0.05); }
        #boot-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; color: #c0c0c0; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: 'Inter', 'Courier New', monospace; font-size: 16px; transition: opacity 0.8s ease; }
        #boot-screen .boot-logo { font-size: 48px; font-weight: bold; color: #ffcc00; margin-bottom: 20px; text-shadow: 0 0 20px #ffcc00; letter-spacing: 4px; }
        #boot-screen .boot-line { margin: 4px 0; opacity: 0; animation: bootFadeIn 0.5s forwards; }
        #boot-screen .boot-line:nth-child(2) { animation-delay: 0.3s; } #boot-screen .boot-line:nth-child(3) { animation-delay: 0.8s; } #boot-screen .boot-line:nth-child(4) { animation-delay: 1.3s; } #boot-screen .boot-line:nth-child(5) { animation-delay: 1.8s; }
        @keyframes bootFadeIn { to { opacity: 1; } }
        #boot-screen.fade-out { opacity: 0; pointer-events: none; }
        .desktop-icon { position: absolute; display: flex; flex-direction: column; align-items: center; width: 75px; padding: 8px 4px; cursor: pointer; z-index: 1; border-radius: 2px; text-align: center; color: #fff; text-shadow: 1px 1px 2px rgba(0,0,0,0.8); font-size: 11px; gap: 4px; }
        .desktop-icon:hover { background: rgba(255,255,255,0.2); }
        .desktop-icon .icon-img { width: var(--icon-size); height: var(--icon-size); font-size: 28px; display: flex; align-items: center; justify-content: center; pointer-events: none; }
        .desktop-icon .icon-label { pointer-events: none; word-wrap: break-word; max-width: 70px; line-height: 1.2; }
        .window { position: absolute; background: var(--window-bg); border: 2px solid; border-color: var(--border-3d-outer) var(--border-3d-inner) var(--border-3d-inner) var(--border-3d-outer); box-shadow: 1px 1px 0 var(--button-dark-shadow), -1px -1px 0 var(--button-face); min-width: 200px; min-height: 120px; z-index: 10; display: flex; flex-direction: column; transition: var(--window-animation); }
        .window.active { z-index: 100; }
        .window.maximized { top: 0 !important; left: 0 !important; width: 100% !important; height: 100% !important; resize: none !important; }
        .window.minimized { display: none; }
        .window .title-bar { background: var(--title-inactive); color: var(--title-text); padding: 3px 4px; display: flex; align-items: center; cursor: pointer; font-size: var(--font-size); font-weight: bold; letter-spacing: 0.5px; gap: 4px; flex-shrink: 0; min-height: 24px; }
        .window.active .title-bar { background: var(--title-active); }
        .window .title-bar .sysmenu-btn { width: 18px; height: 18px; background: var(--button-face); border: 1px solid; border-color: var(--button-highlight) var(--button-shadow) var(--button-shadow) var(--button-highlight); cursor: pointer; font-size: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; line-height: 1; }
        .window .title-bar .sysmenu-btn:active { border-color: var(--button-shadow) var(--button-highlight) var(--button-highlight) var(--button-shadow); }
        .window .title-bar .title-text { flex: 1; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; pointer-events: none; }
        .window .title-bar .win-buttons { display: flex; gap: 2px; flex-shrink: 0; }
        .window .title-bar .win-btn { width: 20px; height: 20px; background: var(--button-face); border: 1px solid; border-color: var(--button-highlight) var(--button-shadow) var(--button-shadow) var(--button-highlight); cursor: pointer; font-size: 10px; display: flex; align-items: center; justify-content: center; font-weight: bold; line-height: 1; padding: 0; color: var(--text); }
        .window .title-bar .win-btn:active { border-color: var(--button-shadow) var(--button-highlight) var(--button-highlight) var(--button-shadow); }
        .window .window-content { flex: 1; overflow: auto; padding: 4px; background: var(--window-bg); position: relative; }
        .window .resize-handle { position: absolute; bottom: 0; right: 0; width: 16px; height: 16px; cursor: nwse-resize; background: linear-gradient(135deg, transparent 50%, var(--button-shadow) 50%, var(--button-face) 60%, var(--button-highlight) 70%); }
        .btn { font-family: 'Inter', sans-serif; font-size: var(--font-size); padding: 4px 16px; background: var(--button-face); border: 2px solid; border-color: var(--button-highlight) var(--button-shadow) var(--button-shadow) var(--button-highlight); cursor: pointer; color: var(--text); outline: none; min-width: 60px; }
        .btn:active { border-color: var(--button-shadow) var(--button-highlight) var(--button-highlight) var(--button-shadow); }
        .btn:focus { outline: 1px dotted var(--text); outline-offset: -4px; }
        input[type="text"], input[type="number"], textarea, select { font-family: 'Inter', sans-serif; font-size: var(--font-size); padding: 3px 4px; border: 2px solid; border-color: var(--button-shadow) var(--button-highlight) var(--button-highlight) var(--button-shadow); background: #fff; color: var(--text); outline: none; }
        [data-theme="midnight"] input[type="text"], [data-theme="midnight"] textarea, [data-theme="midnight"] select { background: #2a2a2a; color: #ccc; }
        input:focus, textarea:focus { outline: 1px solid var(--title-active); }
        .menu-bar { background: var(--button-face); border-bottom: 1px solid var(--button-shadow); padding: 1px 2px; display: flex; gap: 2px; font-size: var(--font-size); flex-shrink: 0; }
        .menu-bar .menu-item { padding: 2px 8px; cursor: pointer; position: relative; white-space: nowrap; }
        .menu-bar .menu-item:hover { background: var(--menu-highlight); color: var(--menu-highlight-text); }
        .dropdown-menu { position: absolute; top: 100%; left: 0; background: var(--menu-bg); border: 2px solid; border-color: var(--button-highlight) var(--button-shadow) var(--button-shadow) var(--button-highlight); z-index: 200; min-width: 160px; display: none; box-shadow: 2px 2px 4px rgba(0,0,0,0.3); padding: 2px; }
        .dropdown-menu.show { display: block; }
        .dropdown-menu .dm-item { padding: 4px 16px; cursor: pointer; white-space: nowrap; color: var(--text); font-size: var(--font-size); }
        .dropdown-menu .dm-item:hover { background: var(--menu-highlight); color: var(--menu-highlight-text); }
        .dropdown-menu .dm-sep { border-top: 1px solid var(--button-shadow); margin: 3px 0; }
        .progman-group { background: var(--window-bg); border: 2px solid; border-color: var(--button-shadow) var(--button-highlight) var(--button-highlight) var(--button-shadow); padding: 2px; display: inline-block; vertical-align: top; margin: 4px; min-width: 140px; }
        .progman-group .group-title { background: var(--title-active); color: #fff; padding: 2px 6px; font-weight: bold; font-size: 11px; text-align: center; cursor: pointer; }
        .progman-group .group-icons { padding: 4px; display: grid; grid-template-columns: repeat(auto-fill, 60px); gap: 2px; justify-content: center; }
        .progman-icon { display: flex; flex-direction: column; align-items: center; padding: 4px; cursor: pointer; text-align: center; font-size: 10px; border-radius: 2px; width: 56px; }
        .progman-icon:hover { background: rgba(0,0,128,0.15); }
        .progman-icon .pi-img { font-size: 24px; pointer-events: none; }
        .progman-icon .pi-label { pointer-events: none; word-wrap: break-word; max-width: 52px; line-height: 1.2; }
        .calc-display { background: #fff; border: 2px inset #808080; padding: 6px 8px; text-align: right; font-family: 'Courier New', monospace; font-size: 18px; margin-bottom: 6px; min-height: 32px; word-break: break-all; color: #000; }
        [data-theme="midnight"] .calc-display { background: #111; color: #0f0; border-color: #444; }
        .calc-buttons { display: grid; grid-template-columns: repeat(5, 1fr); gap: 3px; }
        .calc-buttons .btn { padding: 6px 4px; font-size: 13px; font-weight: bold; min-width: auto; }
        .calc-buttons .btn.op { background: #e0e0e0; }
        .calc-buttons .btn.equals { background: #000080; color: #fff; border-color: #0000cc #000050 #000050 #0000cc; }
        .terminal-output { background: #000; color: #0f0; font-family: 'Courier New', monospace; font-size: 13px; padding: 6px; min-height: 200px; max-height: 400px; overflow-y: auto; white-space: pre-wrap; margin-bottom: 4px; }
        .terminal-input-line { display: flex; gap: 4px; align-items: center; color: #0f0; font-family: 'Courier New', monospace; font-size: 13px; background: #000; padding: 2px 6px; }
        .terminal-input-line span { white-space: nowrap; }
        .terminal-input-line input { flex: 1; background: transparent; border: none; color: #0f0; font-family: 'Courier New', monospace; font-size: 13px; outline: none; padding: 2px; }
        .clock-analog canvas { display: block; margin: 0 auto; }
        .clock-digital { text-align: center; font-size: 36px; font-family: 'Courier New', monospace; font-weight: bold; padding: 20px; }
        .tabs { display: flex; border-bottom: 1px solid var(--button-shadow); margin-bottom: 8px; flex-shrink: 0; }
        .tabs .tab { padding: 4px 12px; cursor: pointer; border: 2px solid transparent; border-bottom: none; margin-bottom: -1px; font-size: var(--font-size); white-space: nowrap; }
        .tabs .tab.active { background: var(--window-bg); border-color: var(--button-shadow) var(--button-shadow) var(--window-bg) var(--button-shadow); font-weight: bold; }
        #screensaver-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 9998; display: none; cursor: none; background: #000; }
        #screensaver-overlay.active { display: block; }
        #screensaver-overlay canvas { width: 100%; height: 100%; }
        .dialog-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 500; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.3); pointer-events: all; }
        .dialog-box { background: var(--button-face); border: 2px solid; border-color: var(--border-3d-outer) var(--border-3d-inner) var(--border-3d-inner) var(--border-3d-outer); padding: 12px; min-width: 250px; max-width: 500px; box-shadow: 3px 3px 8px rgba(0,0,0,0.4); z-index: 501; }
        .dialog-box .dialog-title { background: var(--title-active); color: #fff; padding: 3px 6px; font-weight: bold; margin: -12px -12px 10px -12px; font-size: var(--font-size); }
        .dialog-box .dialog-buttons { display: flex; gap: 6px; justify-content: flex-end; margin-top: 12px; }
        ::-webkit-scrollbar { width: 16px; height: 16px; }
        ::-webkit-scrollbar-track { background: var(--button-face); border: 1px solid var(--button-shadow); }
        ::-webkit-scrollbar-thumb { background: var(--button-face); border: 2px solid; border-color: var(--button-highlight) var(--button-shadow) var(--button-shadow) var(--button-highlight); }
        ::-webkit-scrollbar-button { background: var(--button-face); border: 1px solid; border-color: var(--button-highlight) var(--button-shadow) var(--button-shadow) var(--button-highlight); width: 16px; height: 16px; }
        .file-tree { font-family: 'Courier New', monospace; font-size: 12px; padding: 4px; }
        .file-tree .tree-item { cursor: pointer; padding: 1px 4px; white-space: nowrap; }
        .file-tree .tree-item:hover { background: var(--menu-highlight); color: var(--menu-highlight-text); }
        .wallpaper-preset { display: inline-block; width: 60px; height: 45px; border: 2px solid var(--button-highlight); margin: 2px; cursor: pointer; background-size: cover; background-position: center; border-radius: 2px; }
        .wallpaper-preset:hover { border-color: var(--menu-highlight); }
        .wallpaper-preset.active { border-color: var(--title-active); box-shadow: 0 0 0 2px var(--title-active); }
    </style>
</head>
<body data-theme="classic">

    <div id="boot-screen">
        <div class="boot-logo">💡 Bulb 1.0 Beta</div>
        <div class="boot-line">Copyright (C) Bulb Corporation</div>
        <div class="boot-line">Starting Bulb Environment...</div>
        <div class="boot-line">Loading Program Manager...</div>
        <div class="boot-line">Ready.</div>
    </div>

    <div id="desktop">
        <div id="watermark">Bulb 1.0 Beta</div>
        <div class="desktop-icon" style="top:20px;left:20px;" data-app="progman" ondblclick="WindowManager.restoreOrOpen('progman')">
            <div class="icon-img">📁</div><div class="icon-label">Program Manager</div>
        </div>
    </div>

    <div id="shutdown-overlay">
        <div class="shutdown-logo">💡 Bulb 1.0 Beta</div>
        <div class="shutdown-message">It's now safe to close this browser.</div>
        <div class="shutdown-sub">Thank you for using Bulb 1.0 Beta</div>
        <button class="btn" onclick="window.close()" style="margin-top:20px;">Close Browser</button>
    </div>

    <div id="minimized-container"></div>
    <div id="screensaver-overlay"><canvas id="screensaver-canvas"></canvas></div>
    <div id="dialog-container"></div>
    <div id="window-container"></div>

    <script>
        (function boot() {
            const bootScreen = document.getElementById('boot-screen');
            setTimeout(() => {
                bootScreen.classList.add('fade-out');
                setTimeout(() => {
                    bootScreen.remove();
                    WindowManager.init();
                    loadSettings();
                    WindowManager.open('progman');
                    initScreenSaver();
                }, 800);
            }, 2500);
        })();

        const BUILTIN_WALLPAPERS = ['abstract', 'nature', 'retro', 'dark', 'circuit'];
        function getWallpaperUrl(name) { return `url(/wallpaper/${name}.webp)`; }

        function shutdownSystem() {
            if (screenSaverActive) deactivateScreenSaver();
            if (screenSaverTimeout) clearTimeout(screenSaverTimeout);
            Object.keys(WindowManager.windows).forEach(app => {
                if (app !== 'progman') WindowManager.close(app);
            });
            document.getElementById('shutdown-overlay').classList.add('active');
            document.body.style.pointerEvents = 'none';
            saveSettings();
        }

        function saveSettings() {
            const s = {
                theme: document.body.getAttribute('data-theme') || 'classic',
                wallpaperPreset: localStorage.getItem('bulb_wallpaper_preset') || 'none',
                wallpaperTile: document.body.style.getPropertyValue('--wallpaper-tile') || 'no-repeat',
                wallpaperPos: document.body.style.getPropertyValue('--wallpaper-position') || 'center',
                wallpaperSize: document.body.style.getPropertyValue('--wallpaper-size') || 'auto',
                iconSize: getComputedStyle(document.body).getPropertyValue('--icon-size').trim(),
                fontSize: getComputedStyle(document.body).getPropertyValue('--font-size').trim(),
                screenSaverTimeout: localStorage.getItem('bulb_screensaver_timeout') || '300',
                notes: localStorage.getItem('bulb_notes') || '',
            };
            localStorage.setItem('bulb_settings', JSON.stringify(s));
        }

        function loadSettings() {
            const raw = localStorage.getItem('bulb_settings');
            if (!raw) return;
            try {
                const s = JSON.parse(raw);
                if (s.theme) applyTheme(s.theme);
                const preset = s.wallpaperPreset || 'none';
                if (preset !== 'none' && BUILTIN_WALLPAPERS.includes(preset)) {
                    document.body.style.setProperty('--wallpaper-url', getWallpaperUrl(preset));
                    document.body.style.setProperty('--desktop-override', 'var(--desktop-bg)');
                } else {
                    document.body.style.setProperty('--wallpaper-url', 'none');
                }
                if (s.wallpaperTile) document.body.style.setProperty('--wallpaper-tile', s.wallpaperTile);
                if (s.wallpaperPos) document.body.style.setProperty('--wallpaper-position', s.wallpaperPos);
                if (s.wallpaperSize) document.body.style.setProperty('--wallpaper-size', s.wallpaperSize);
                if (s.iconSize) document.body.style.setProperty('--icon-size', s.iconSize);
                if (s.fontSize) document.body.style.setProperty('--font-size', s.fontSize);
                if (s.screenSaverTimeout) localStorage.setItem('bulb_screensaver_timeout', s.screenSaverTimeout);
                if (s.notes) localStorage.setItem('bulb_notes', s.notes);
            } catch (e) {}
            // Watermark always visible
            document.getElementById('watermark').style.display = 'block';
        }

        function applyTheme(name) {
            document.body.setAttribute('data-theme', name);
            localStorage.setItem('bulb_theme', name);
            saveSettings();
        }

        let screenSaverTimeout = null, screenSaverActive = false, screenSaverAnimationId = null;

        function initScreenSaver() {
            const timeout = parseInt(localStorage.getItem('bulb_screensaver_timeout') || '300') * 1000;
            resetScreenSaverTimer(timeout);
            document.addEventListener('mousemove', () => resetScreenSaverTimer(timeout));
            document.addEventListener('keydown', () => resetScreenSaverTimer(timeout));
            document.addEventListener('click', () => { if (screenSaverActive) deactivateScreenSaver(); });
        }

        function resetScreenSaverTimer(timeout) {
            if (screenSaverTimeout) clearTimeout(screenSaverTimeout);
            if (screenSaverActive) return;
            const t = timeout || parseInt(localStorage.getItem('bulb_screensaver_timeout') || '300') * 1000;
            if (t <= 0) return;
            screenSaverTimeout = setTimeout(activateScreenSaver, t);
        }

        function activateScreenSaver() {
            if (screenSaverActive) return;
            screenSaverActive = true;
            document.getElementById('screensaver-overlay').classList.add('active');
            const canvas = document.getElementById('screensaver-canvas');
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            const ctx = canvas.getContext('2d');
            const type = localStorage.getItem('bulb_screensaver_type') || 'stars';
            runScreenSaver(ctx, canvas, type);
        }

        function deactivateScreenSaver() {
            if (!screenSaverActive) return;
            screenSaverActive = false;
            if (screenSaverAnimationId) cancelAnimationFrame(screenSaverAnimationId);
            document.getElementById('screensaver-overlay').classList.remove('active');
            resetScreenSaverTimer();
        }

        function runScreenSaver(ctx, canvas, type) {
            let particles = [];
            const w = canvas.width, h = canvas.height;
            if (type === 'stars') for (let i = 0; i < 200; i++) particles.push({ x: Math.random()*w, y: Math.random()*h, z: Math.random()*3+0.5, speed: Math.random()*2+0.5 });
            else if (type === 'bounce') particles.push({ x: w/2, y: h/2, vx: 3, vy: 2, r: 30, text: '💡' });
            else if (type === 'flying') particles.push({ x: -50, y: h/2, vx: 2.5, vy: 1.2, text: '💡 Bulb', size: 28 });
            function frame() {
                if (!screenSaverActive) return;
                ctx.fillStyle = '#000'; ctx.fillRect(0,0,w,h);
                if (type === 'stars') {
                    ctx.fillStyle = '#fff';
                    particles.forEach(p => {
                        p.z -= p.speed*0.02; if (p.z <= 0) { p.z=3; p.x=Math.random()*w; p.y=Math.random()*h; }
                        const sx = (p.x-w/2)/p.z + w/2, sy = (p.y-h/2)/p.z + h/2, r = (1-p.z/3)*2.5;
                        ctx.beginPath(); ctx.arc(sx,sy,r,0,Math.PI*2); ctx.fill();
                    });
                } else if (type === 'bounce') {
                    const p = particles[0]; p.x += p.vx; p.y += p.vy;
                    if (p.x-p.r<0||p.x+p.r>w) p.vx*=-1; if (p.y-p.r<0||p.y+p.r>h) p.vy*=-1;
                    ctx.font = `${p.r*2}px sans-serif`; ctx.fillText(p.text, p.x-p.r, p.y+p.r*0.35);
                } else if (type === 'flying') {
                    const p = particles[0]; p.x += p.vx; p.y += p.vy;
                    if (p.x>w+80) p.x=-80; if (p.y<20||p.y>h-20) p.vy*=-1;
                    ctx.font = `${p.size}px sans-serif`; ctx.fillStyle='#ffcc00'; ctx.fillText(p.text, p.x, p.y);
                }
                screenSaverAnimationId = requestAnimationFrame(frame);
            }
            frame();
        }

        const WindowManager = {
            windows: {}, zIndexCounter: 10,

                this.container = document.getElementById('window-container');

                document.getElementById('desktop').addEventListener('mousedown', (e) => {
                    if (e.target === document.getElementById('desktop') || e.target.classList.contains('desktop-icon')) {
                        Object.values(this.windows).forEach(w => w.el.classList.remove('active'));
                        this.updateMinimizedIcons();
                    }
                });
            },
            open(appName, options = {}) {
                if (this.windows[appName]) {
                    this.focus(appName);
                    if (this.windows[appName].minimized) this.restore(appName);
                    if (options.filePath && appName === 'notepad') {
                        initNotepadFile(this.windows[appName].el.querySelector('.window-content'), options.filePath);
                    }
                    return;
                }

                if (!winData) return;

                el.querySelector('.title-bar').addEventListener('mousedown', (e) => this.startDrag(e, appName));
                el.querySelector('.resize-handle').addEventListener('mousedown', (e) => this.startResize(e, appName));
                el.addEventListener('mousedown', () => this.focus(appName));
                el.querySelector('.minimize-btn').addEventListener('click', (e) => { e.stopPropagation(); this.minimize(appName); });
                el.querySelector('.maximize-btn').addEventListener('click', (e) => { e.stopPropagation(); this.toggleMaximize(appName); });
                el.querySelector('.close-btn').addEventListener('click', (e) => { e.stopPropagation(); this.close(appName); });
                el.querySelector('.sysmenu-btn').addEventListener('click', (e) => {
                    e.stopPropagation();
                    if (appName === 'progman') {
                        showDialog('Program Manager', 'Do you want to exit Windows?', ['Yes','No'], (idx) => { if(idx===0) shutdownSystem(); });
                    } else {
                        showDialog('System Menu', 'Restore, Move, Size, Minimize, Maximize, Close', ['Close','Cancel'], (idx) => { if(idx===0) this.close(appName); });
                    }
                });
                el.querySelector('.title-bar').addEventListener('dblclick', () => this.toggleMaximize(appName));
                const winData = { el, appName, title, minimized:false, maximized:false, prevBounds:null, dragOffsetX:0, dragOffsetY:0 };
                if(options.filePath) winData.filePath = options.filePath;
                return winData;
            },
            positionWindow(appName) {
                const win = this.windows[appName]; if(!win) return;
                const count = Object.keys(this.windows).length, offset = (count-1)*25;
                win.el.style.top = (40+offset%300)+'px'; win.el.style.left = (30+offset%400)+'px';
            },
            focus(appName) {
                const win = this.windows[appName]; if(!win) return;
                if(win.minimized) { this.restore(appName); return; }
                Object.values(this.windows).forEach(w => w.el.classList.remove('active'));
                win.el.classList.add('active'); win.el.style.zIndex = ++this.zIndexCounter;
                this.updateMinimizedIcons();

                if(appName==='terminal') focusTerminalInput();

            minimize(appName) {
                const win = this.windows[appName]; if(!win) return;
                win.minimized = true; win.el.classList.add('minimized'); win.el.classList.remove('active');
                this.updateMinimizedIcons(); saveSettings();
            },
            restore(appName) {
                const win = this.windows[appName]; if(!win) return;
                win.minimized = false; win.el.classList.remove('minimized');
                this.focus(appName); this.updateMinimizedIcons(); saveSettings();
            },
            restoreOrOpen(appName) {
                if(this.windows[appName] && this.windows[appName].minimized) this.restore(appName);
                else if(this.windows[appName]) this.focus(appName);
                else this.open(appName);
            },
            toggleMaximize(appName) {
                const win = this.windows[appName]; if(!win) return;
                if(win.maximized) {
                    win.maximized = false; win.el.classList.remove('maximized');
                    if(win.prevBounds) { win.el.style.top=win.prevBounds.top; win.el.style.left=win.prevBounds.left; win.el.style.width=win.prevBounds.width; win.el.style.height=win.prevBounds.height; }
                } else {
                    win.prevBounds = { top:win.el.style.top, left:win.el.style.left, width:win.el.style.width, height:win.el.style.height };
                    win.maximized = true; win.el.classList.add('maximized');
                }
                saveSettings();
            },
            close(appName) {
                const win = this.windows[appName]; if(!win) return;
                if(appName === 'progman') { shutdownSystem(); return; }
                if(appName==='clock' && win._clockInterval) clearInterval(win._clockInterval);
                win.el.remove(); delete this.windows[appName];
                this.updateMinimizedIcons(); saveSettings();
            },
            startDrag(e, appName) {
                const win = this.windows[appName]; if(!win||win.maximized) return;
                if(e.target.closest('.win-btn')||e.target.closest('.sysmenu-btn')) return;
                const rect = win.el.getBoundingClientRect(); win.dragOffsetX=e.clientX-rect.left; win.dragOffsetY=e.clientY-rect.top; win._dragging=true;
                const onMove = (ev) => { if(!win._dragging) return; win.el.style.top=Math.max(0,ev.clientY-win.dragOffsetY)+'px'; win.el.style.left=Math.max(0,ev.clientX-win.dragOffsetX)+'px'; };
                const onUp = () => { win._dragging=false; document.removeEventListener('mousemove',onMove); document.removeEventListener('mouseup',onUp); saveSettings(); };
                document.addEventListener('mousemove',onMove); document.addEventListener('mouseup',onUp);
            },
            startResize(e, appName) {
                const win = this.windows[appName]; if(!win||win.maximized) return;
                e.stopPropagation(); const rect = win.el.getBoundingClientRect(); const startX=e.clientX, startY=e.clientY, startW=rect.width, startH=rect.height;
                const onMove = (ev) => { win.el.style.width=Math.max(200,startW+ev.clientX-startX)+'px'; win.el.style.height=Math.max(120,startH+ev.clientY-startY)+'px'; };
                const onUp = () => { document.removeEventListener('mousemove',onMove); document.removeEventListener('mouseup',onUp); saveSettings(); };
                document.addEventListener('mousemove',onMove); document.addEventListener('mouseup',onUp);
            },
            updateMinimizedIcons() {
                const minimized = Object.values(this.windows).filter(w=>w.minimized);
                this.minimizedContainer.innerHTML = minimized.map(w => {
                    const icon = w.appName==='progman'?'📁':w.appName==='calculator'?'🔢':w.appName==='notepad'?'📝':w.appName==='paint'?'🎨':w.appName==='clock'?'🕐':w.appName==='terminal'?'💻':w.appName==='controlpanel'?'⚙️':w.appName==='filemanager'?'🗄️':'💡';
                    return `<div class="minimized-icon" title="${w.title}" onclick="WindowManager.restore('${w.appName}')">${icon}</div>`;
                }).join('');
            }
        };

        function buildProgramManager() {

        function buildCalculator() { return `<div class="calc-display" id="calc-display">0</div><div class="calc-buttons" id="calc-buttons"><button class="btn" data-action="clear">C</button><button class="btn" data-action="clearEntry">CE</button><button class="btn" data-action="backspace">⌫</button><button class="btn op" data-action="sqrt">√</button><button class="btn op" data-action="percent">%</button><button class="btn" data-action="digit" data-val="7">7</button><button class="btn" data-action="digit" data-val="8">8</button><button class="btn" data-action="digit" data-val="9">9</button><button class="btn op" data-action="divide">/</button><button class="btn op" data-action="multiply">×</button><button class="btn" data-action="digit" data-val="4">4</button><button class="btn" data-action="digit" data-val="5">5</button><button class="btn" data-action="digit" data-val="6">6</button><button class="btn op" data-action="subtract">−</button><button class="btn op" data-action="add">+</button><button class="btn" data-action="digit" data-val="1">1</button><button class="btn" data-action="digit" data-val="2">2</button><button class="btn" data-action="digit" data-val="3">3</button><button class="btn equals" data-action="equals">=</button><button class="btn" data-action="digit" data-val="0" style="grid-column:span 2;">0</button><button class="btn" data-action="decimal">.</button></div>`; }
        function initCalculator(container) {
            if(container.dataset.calcInit) return;
            container.dataset.calcInit='1';
            let cur='0', prev='', op=null, reset=false;
            const disp=container.querySelector('#calc-display');
            function upd(){ disp.textContent = cur.length>14?parseFloat(cur).toExponential(6):cur; }
            container.querySelector('#calc-buttons').addEventListener('click',e=>{
                const btn=e.target.closest('button'); if(!btn) return;
                const a=btn.dataset.action, v=btn.dataset.val;
                if(a==='digit'){
                    if(reset){ cur=''; reset=false; }
                    cur = cur==='0'? v : cur+v;
                }else if(a==='decimal'){
                    if(reset){ cur='0'; reset=false; }
                    if(!cur.includes('.')) cur+='.';
                }else if(a==='clear'){ cur='0'; prev=''; op=null; reset=false; }
                else if(a==='clearEntry') cur='0';
                else if(a==='backspace') cur = cur.length>1? cur.slice(0,-1) : '0';
                else if(a==='sqrt'){ const n=parseFloat(cur); cur = n>=0? Math.sqrt(n).toString():'Error'; reset=true; }
                else if(a==='percent'){ cur = (parseFloat(cur)/100).toString(); reset=true; }
                else if(['add','subtract','multiply','divide'].includes(a)){
                    if(op && !reset) compute();
                    prev=cur; op=a; reset=true;
                }else if(a==='equals'){ compute(); op=null; }
                upd();
            });
            function compute(){
                const p=parseFloat(prev), c=parseFloat(cur);
                if(isNaN(p)||isNaN(c)) return;
                let r;
                switch(op){ case'add':r=p+c;break; case'subtract':r=p-c;break; case'multiply':r=p*c;break; case'divide':r=c!==0?p/c:'Error';break; default:return; }
                cur = typeof r==='number'? parseFloat(r.toPrecision(12)).toString():r;
                prev=''; reset=true;
            }
            container.setAttribute('tabindex','0'); container.focus();
        }

        function buildNotepad() {

        function loadFileContent(path, textarea){ const fs=getFS(); if(fs[path]&&fs[path].type==='file') textarea.value=fs[path].content||''; }

        function buildPaint() { return `<div style="display:flex;gap:4px;margin-bottom:4px;flex-wrap:wrap;align-items:center;"><button class="btn paint-tool active" data-tool="pencil">✏️</button><button class="btn paint-tool" data-tool="brush">🖌️</button><button class="btn paint-tool" data-tool="eraser">🧹</button><input type="color" id="paint-color" value="#000000" style="width:32px;height:28px;"><input type="range" id="paint-size" min="1" max="20" value="3" style="width:80px;"><button class="btn" id="paint-clear">Clear</button><button class="btn" id="paint-export">💾 Export PNG</button></div><canvas id="paint-canvas" style="border:2px inset #808080;width:100%;height:calc(100% - 50px);cursor:crosshair;background:#fff;"></canvas>`; }
        function initPaint(container) {
            if(container.dataset.paintInit) return;
            container.dataset.paintInit='1';
            const canvas=container.querySelector('#paint-canvas'), ctx=canvas.getContext('2d');
            let tool='pencil', color='#000000', size=3, drawing=false, lx,ly;
            function resize(){
                const rect=canvas.parentElement.getBoundingClientRect();
                const w=rect.width-8, h=rect.height-60;
                if(canvas.width!==w||canvas.height!==h){
                    const img=ctx.getImageData(0,0,canvas.width,canvas.height);
                    canvas.width=Math.max(w,200); canvas.height=Math.max(h,150);
                    ctx.fillStyle='#fff'; ctx.fillRect(0,0,canvas.width,canvas.height);
                    if(img.width>0) ctx.putImageData(img,0,0);
                }
            }
            resize(); ctx.fillStyle='#fff'; ctx.fillRect(0,0,canvas.width,canvas.height);
            container.querySelectorAll('.paint-tool').forEach(b=>b.addEventListener('click',()=>{container.querySelectorAll('.paint-tool').forEach(x=>x.classList.remove('active')); b.classList.add('active'); tool=b.dataset.tool;}));
            container.querySelector('#paint-color').addEventListener('input',e=>color=e.target.value);
            container.querySelector('#paint-size').addEventListener('input',e=>size=parseInt(e.target.value));
            container.querySelector('#paint-clear').addEventListener('click',()=>{ctx.fillStyle='#fff';ctx.fillRect(0,0,canvas.width,canvas.height);});
            container.querySelector('#paint-export').addEventListener('click',()=>{const a=document.createElement('a');a.download='painting.png';a.href=canvas.toDataURL();a.click();});
            canvas.addEventListener('mousedown',e=>{drawing=true;const r=canvas.getBoundingClientRect();lx=e.clientX-r.left;ly=e.clientY-r.top;drawPoint(lx,ly);});
            canvas.addEventListener('mousemove',e=>{if(!drawing)return;const r=canvas.getBoundingClientRect();const x=e.clientX-r.left,y=e.clientY-r.top;drawLine(lx,ly,x,y);lx=x;ly=y;});
            canvas.addEventListener('mouseup',()=>drawing=false);
            canvas.addEventListener('mouseleave',()=>drawing=false);
            function drawPoint(x,y){ctx.fillStyle=tool==='eraser'?'#fff':color;ctx.beginPath();ctx.arc(x,y,size/2,0,Math.PI*2);ctx.fill();}
            function drawLine(x1,y1,x2,y2){ctx.strokeStyle=tool==='eraser'?'#fff':color;ctx.lineWidth=size;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();}
        }

        function buildClock() { return `<div style="text-align:center;margin-bottom:6px;"><button class="btn clock-mode-btn" data-mode="analog">Analog</button><button class="btn clock-mode-btn active" data-mode="digital">Digital</button></div><div id="clock-analog-container" style="display:none;"><canvas id="clock-canvas" width="220" height="220"></canvas></div><div id="clock-digital-container"><div class="clock-digital" id="clock-digital-display">00:00:00</div></div>`; }
        function initClockApp(){
            const win=WindowManager.getWindow('clock'); if(!win) return;
            const c=win.el.querySelector('.window-content');
            if(c.dataset.clockInit) return updateClockDisplay(c);
            c.dataset.clockInit='1'; let mode='digital';
            c.querySelectorAll('.clock-mode-btn').forEach(b=>b.addEventListener('click',()=>{c.querySelectorAll('.clock-mode-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');mode=b.dataset.mode;updateClockMode(c,mode);}));
            updateClockMode(c,mode);
            win._clockInterval=setInterval(()=>updateClockDisplay(c),1000);
        }
        function updateClockMode(c,mode){c.querySelector('#clock-analog-container').style.display=mode==='analog'?'block':'none';c.querySelector('#clock-digital-container').style.display=mode==='digital'?'block':'none';updateClockDisplay(c);}
        function updateClockDisplay(c){
            const now=new Date();
            const d=c.querySelector('#clock-digital-display'); if(d&&d.parentElement.style.display!=='none') d.textContent=now.toLocaleTimeString('en-US',{hour12:true});
            const a=c.querySelector('#clock-analog-container'); if(a&&a.style.display!=='none'){
                const canvas=c.querySelector('#clock-canvas'); if(!canvas) return;
                const ctx=canvas.getContext('2d'), cx=canvas.width/2, cy=canvas.height/2, r=Math.min(cx,cy)-10;
                ctx.clearRect(0,0,canvas.width,canvas.height);
                ctx.fillStyle='#fff'; ctx.strokeStyle='#000'; ctx.lineWidth=3; ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.fill(); ctx.stroke();
                ctx.fillStyle='#000'; ctx.beginPath(); ctx.arc(cx,cy,4,0,Math.PI*2); ctx.fill();
                ctx.font='bold 14px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
                for(let i=1;i<=12;i++){ let angle=(i*30-90)*Math.PI/180; ctx.fillText(i.toString(), cx+Math.cos(angle)*(r-18), cy+Math.sin(angle)*(r-18)); }
                const h=now.getHours()%12, m=now.getMinutes(), s=now.getSeconds();
                drawHand(ctx,cx,cy,(h+m/60)*30-90, r*0.5,5,'#000');
                drawHand(ctx,cx,cy,m*6-90, r*0.7,3,'#000');
                drawHand(ctx,cx,cy,s*6-90, r*0.85,1,'#c00');
            }
        }
        function drawHand(ctx,cx,cy,deg,len,w,col){ let a=deg*Math.PI/180; ctx.strokeStyle=col; ctx.lineWidth=w; ctx.lineCap='round'; ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(cx+Math.cos(a)*len, cy+Math.sin(a)*len); ctx.stroke(); }

        function buildTerminal(){ return `<div class="terminal-output" id="terminal-output">Bulb 1.0 Beta Terminal [Version 1.0.0]\nType <b>help</b> for commands.\n──────────────────────\n</div><div class="terminal-input-line"><span>C:\\&gt;</span><input type="text" id="terminal-input" autocomplete="off"></div>`; }
        function initTerminal(c){
            if(c.dataset.termInit) return; c.dataset.termInit='1';
            const out=c.querySelector('#terminal-output'), inp=c.querySelector('#terminal-input');
            const cmds={
                help:()=>`Available commands:\n  help, ver, cls, dir, date, time, theme, wallpaper, about, shutdown`,
                ver:()=>'Bulb 1.0 Beta Build 1000',
                cls:()=>{out.innerHTML='';return'';},
                dir:()=>`Volume in drive C is BULB_OS\nDirectory of C:\\\nDESKTOP    <DIR>\nDOCUMENTS  <DIR>\nWALLPAPERS <DIR>\nNOTES      <DIR>`,
                date:()=>new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'}),
                time:()=>new Date().toLocaleTimeString('en-US',{hour12:true}),
                theme:(args)=>{if(args.length){const t=args[0].toLowerCase();const v=['classic','ocean','forest','retro','midnight'];if(v.includes(t)){applyTheme(t);return`Theme set to ${t}`;}return'Invalid theme.';}return`Current theme: ${document.body.getAttribute('data-theme')}`;},
                wallpaper:()=>document.body.style.getPropertyValue('--wallpaper-url')&&document.body.style.getPropertyValue('--wallpaper-url')!=='none'?'Custom wallpaper set.':'Default desktop color.',
                about:()=>'Bulb 1.0 Beta (C) Bulb Corporation',
                shutdown:()=>{shutdownSystem();return'Shutting down...';}
            };
            inp.addEventListener('keydown',e=>{
                if(e.key==='Enter'){
                    const cmd=inp.value.trim(); out.innerHTML+=`<div>C:\\&gt; ${cmd}</div>`;
                    if(cmd){ const parts=cmd.split(/\s+/),cn=parts[0].toLowerCase(),args=parts.slice(1); if(cmds[cn]){ const res=cmds[cn](args); if(res) out.innerHTML+=`<div>${res}</div>`; } else out.innerHTML+=`<div>Bad command: ${cn}</div>`; }
                    inp.value=''; out.scrollTop=out.scrollHeight;
                }
            });
            inp.focus();
        }
        function focusTerminalInput(){setTimeout(()=>{const i=document.querySelector('#terminal-input');if(i&&i.closest('.window.active'))i.focus();},100);}

        function buildControlPanel(){return `<div class="tabs"><div class="tab active" data-tab="desktop">Desktop</div><div class="tab" data-tab="themes">Themes</div><div class="tab" data-tab="appearance">Appearance</div><div class="tab" data-tab="screensaver">Screen Saver</div><div class="tab" data-tab="datetime">Date & Time</div></div><div id="cp-content" style="overflow-y:auto;max-height:350px;"></div>`;}
        function initControlPanel(c){
            if(c.dataset.cpInit) return; c.dataset.cpInit='1';
            const content=c.querySelector('#cp-content'), tabs=c.querySelectorAll('.tab');
            function showTab(name){
                tabs.forEach(t=>t.classList.remove('active')); c.querySelector(`[data-tab="${name}"]`)?.classList.add('active');
                switch(name){
                    case'desktop':content.innerHTML=buildCPDesktop();initCPDesktop(content);break;
                    case'themes':content.innerHTML=buildCPThemes();initCPThemes(content);break;
                    case'appearance':content.innerHTML=buildCPAppearance();initCPAppearance(content);break;
                    case'screensaver':content.innerHTML=buildCPScreenSaver();initCPScreenSaver(content);break;
                    case'datetime':content.innerHTML=buildCPDateTime();break;
                }
            }
            tabs.forEach(t=>t.addEventListener('click',()=>showTab(t.dataset.tab)));
            showTab('desktop');
        }
        function buildCPDesktop(){
            return `<p><strong>Built-in Wallpapers</strong></p>
            <div id="cp-wallpaper-presets" style="display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap;"></div>
            <p><strong>Wallpaper Style</strong></p>
            <div style="display:flex;gap:4px;margin-bottom:8px;">
                <button class="btn cp-wallstyle active" data-style="tile">Tile</button>
                <button class="btn cp-wallstyle" data-style="center">Center</button>
                <button class="btn cp-wallstyle" data-style="stretch">Stretch</button>
            </div>`;
        }
        function initCPDesktop(c){
            const presetsContainer = c.querySelector('#cp-wallpaper-presets');
            const currentPreset = localStorage.getItem('bulb_wallpaper_preset') || 'none';
            BUILTIN_WALLPAPERS.forEach(name => {
                const div = document.createElement('div');
                div.className = 'wallpaper-preset' + (name === currentPreset ? ' active' : '');
                div.style.backgroundImage = getWallpaperUrl(name);
                div.title = name;
                div.addEventListener('click', () => {
                    document.body.style.setProperty('--wallpaper-url', getWallpaperUrl(name));
                    document.body.style.setProperty('--desktop-override', 'var(--desktop-bg)');
                    localStorage.setItem('bulb_wallpaper_preset', name);
                    saveSettings();
                    c.querySelectorAll('.wallpaper-preset').forEach(p => p.classList.remove('active'));
                    div.classList.add('active');
                });
                presetsContainer.appendChild(div);
            });
            c.querySelectorAll('.cp-wallstyle').forEach(b=>b.addEventListener('click',()=>{
                c.querySelectorAll('.cp-wallstyle').forEach(x=>x.classList.remove('active'));
                b.classList.add('active');
                const s=b.dataset.style;
                document.body.style.setProperty('--wallpaper-tile', s==='tile'?'repeat':'no-repeat');
                document.body.style.setProperty('--wallpaper-position', s==='center'?'center':'top left');
                document.body.style.setProperty('--wallpaper-size', s==='stretch'?'100% 100%':'auto');
                saveSettings();
            }));
            // Watermark toggle removed – Beta watermark is permanent
        }
        function buildCPThemes(){const themes=[{name:'classic',label:'Classic Gray'},{name:'ocean',label:'Ocean Blue'},{name:'forest',label:'Forest Green'},{name:'retro',label:'Retro Beige'},{name:'midnight',label:'Midnight Black'}];return themes.map(t=>`<div class="cp-theme-item" data-theme="${t.name}" style="padding:6px;margin:4px 0;border:1px solid #808080;cursor:pointer;">${t.label}</div>`).join('');}
        function initCPThemes(c){c.querySelectorAll('.cp-theme-item').forEach(i=>i.addEventListener('click',()=>applyTheme(i.dataset.theme)));}
        function buildCPAppearance(){return `<p>Icon Size: <span id="cp-icon-size-val">32</span>px</p><input type="range" id="cp-icon-size" min="20" max="48" value="32" style="width:100%;"><p>Font Size: <span id="cp-font-size-val">12</span>px</p><input type="range" id="cp-font-size" min="10" max="18" value="12" style="width:100%;"><p>Window Animations: <label><input type="checkbox" id="cp-animations"> Enable</label></p>`;}
        function initCPAppearance(c){
            const is=c.querySelector('#cp-icon-size'), iv=c.querySelector('#cp-icon-size-val'), fs=c.querySelector('#cp-font-size'), fv=c.querySelector('#cp-font-size-val'), ac=c.querySelector('#cp-animations');
            is.value=parseInt(getComputedStyle(document.body).getPropertyValue('--icon-size')); iv.textContent=is.value;
            fs.value=parseInt(getComputedStyle(document.body).getPropertyValue('--font-size')); fv.textContent=fs.value;
            ac.checked=getComputedStyle(document.body).getPropertyValue('--window-animation')!=='none';
            is.addEventListener('input',()=>{document.body.style.setProperty('--icon-size',is.value+'px');iv.textContent=is.value;saveSettings();});
            fs.addEventListener('input',()=>{document.body.style.setProperty('--font-size',fs.value+'px');fv.textContent=fs.value;saveSettings();});
            ac.addEventListener('change',()=>{document.body.style.setProperty('--window-animation',ac.checked?'all 0.15s ease':'none');saveSettings();});
        }
        function buildCPScreenSaver(){const ct=localStorage.getItem('bulb_screensaver_type')||'stars', cto=localStorage.getItem('bulb_screensaver_timeout')||'300';return `<p>Type:</p><select id="cp-ss-type" style="width:100%;margin-bottom:8px;"><option value="stars" ${ct==='stars'?'selected':''}>Starfield</option><option value="bounce" ${ct==='bounce'?'selected':''}>Bouncing Bulb</option><option value="flying" ${ct==='flying'?'selected':''}>Flying Bulb Logo</option><option value="blank" ${ct==='blank'?'selected':''}>Blank Screen</option></select><p>Timeout:</p><select id="cp-ss-timeout" style="width:100%;margin-bottom:8px;"><option value="60" ${cto==='60'?'selected':''}>1 min</option><option value="300" ${cto==='300'?'selected':''}>5 min</option><option value="600" ${cto==='600'?'selected':''}>10 min</option><option value="1800" ${cto==='1800'?'selected':''}>30 min</option><option value="0" ${cto==='0'?'selected':''}>Never</option></select><button class="btn" id="cp-ss-preview">Preview</button>`;}
        function initCPScreenSaver(c){
            c.querySelector('#cp-ss-type').addEventListener('change',e=>{localStorage.setItem('bulb_screensaver_type',e.target.value);saveSettings();});
            c.querySelector('#cp-ss-timeout').addEventListener('change',e=>{localStorage.setItem('bulb_screensaver_timeout',e.target.value);saveSettings();resetScreenSaverTimer(parseInt(e.target.value)*1000);});
            c.querySelector('#cp-ss-preview').addEventListener('click',()=>{localStorage.setItem('bulb_screensaver_type',c.querySelector('#cp-ss-type').value);activateScreenSaver();setTimeout(deactivateScreenSaver,4000);});
        }
        function buildCPDateTime(){return `<p><strong>Current Date & Time:</strong></p><p style="font-size:16px;">${new Date().toLocaleString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric',hour:'2-digit',minute:'2-digit',second:'2-digit'})}</p>`;}

        function buildFileManager(){return `<div style="display:flex;gap:8px;height:100%;"><div style="width:180px;border:2px inset #808080;overflow-y:auto;background:#fff;padding:4px;" id="fm-tree"><div class="file-tree" id="file-tree-content"></div></div><div style="flex:1;border:2px inset #808080;overflow-y:auto;background:#fff;padding:4px;" id="fm-content"><div id="fm-file-list"></div></div></div>`;}
        function initFileManager(c){
            if(c.dataset.fmInit) return; c.dataset.fmInit='1';
            const tree=c.querySelector('#file-tree-content'), list=c.querySelector('#fm-file-list');
            let currentPath='C:\\'; const fs=getFS();
            function renderTree(){
                const dirs=Object.keys(fs).filter(k=>fs[k].type==='dir').sort();
                tree.innerHTML=dirs.map(d=>{const indent=(d.split('\\').filter(Boolean).length-1)*16;const name=d.split('\\').pop()||d;return`<div class="tree-item" style="padding-left:${indent+4}px;" data-path="${d}">${d===currentPath?'📂':'📁'} ${name||d}</div>`;}).join('');
                tree.querySelectorAll('.tree-item').forEach(i=>i.addEventListener('click',()=>{currentPath=i.dataset.path;renderTree();renderFileList();}));
            }
            function renderFileList(){
                const dir=fs[currentPath]; if(!dir||dir.type!=='dir'){list.innerHTML='<p>Invalid path.</p>';return;}
                const children=dir.children||[]; let html='<p><strong>Contents of '+currentPath+'</strong></p>';
                if(currentPath!=='C:\\'){const parent=currentPath.substring(0,currentPath.lastIndexOf('\\'))||'C:\\';html+=`<div class="tree-item" data-path="${parent}" style="cursor:pointer;">📁 .. (Up)</div>`;}
                children.forEach(child=>{const childPath=currentPath+(currentPath.endsWith('\\')?'':'\\')+child;const isDir=fs[childPath]&&fs[childPath].type==='dir';html+=`<div class="tree-item" data-path="${childPath}" style="cursor:pointer;">${isDir?'📁':'📄'} ${child}</div>`;});
                if(children.length===0&&currentPath==='C:\\')html+='<p><em>Empty directory.</em></p>';
                list.innerHTML=html;
                list.querySelectorAll('.tree-item').forEach(item=>item.addEventListener('click',()=>{
                    const p=item.dataset.path;
                    if(fs[p]&&fs[p].type==='dir'){currentPath=p;renderTree();renderFileList();}
                    else if(fs[p]&&fs[p].type==='file'){
                        if(p.toLowerCase().endsWith('.txt')) WindowManager.open('notepad',{filePath:p});
                        else showDialog('File: '+(p.split('\\').pop()),'<pre style="max-height:300px;overflow:auto;">'+(fs[p].content||'(empty)')+'</pre>',['OK']);
                    }
                }));
            }
            renderTree(); renderFileList();
        }

        function buildAbout(){return `<div style="text-align:center;padding:16px;"><div style="font-size:36px;">💡</div><h2>Bulb 1.0 Beta</h2><p>Build 1000</p><p>Copyright (C) Bulb Corporation</p><hr style="margin:12px 0;"><p>Browser-Based Operating Environment</p><p style="font-size:10px;">No servers required</p><button class="btn" style="margin-top:12px;" onclick="WindowManager.close('about')">OK</button></div>`;}

        const origOpen=WindowManager.open; WindowManager.open=function(app,opt){origOpen.call(this,app,opt);setTimeout(()=>{const w=this.windows[app];if(!w)return;const cont=w.el.querySelector('.window-content');if(app==='calculator')initCalculator(cont);else if(app==='notepad')initNotepad(cont);else if(app==='paint')initPaint(cont);else if(app==='clock')initClockApp();else if(app==='terminal')initTerminal(cont);else if(app==='controlpanel')initControlPanel(cont);else if(app==='filemanager')initFileManager(cont);else if(app==='progman')initProgramManager(cont);},50);};
        const origFocus=WindowManager.focus; WindowManager.focus=function(app){origFocus.call(this,app);setTimeout(()=>{const w=this.windows[app];if(!w)return;const cont=w.el.querySelector('.window-content');if(app==='calculator'&&!cont.dataset.calcInit)initCalculator(cont);else if(app==='notepad'&&!cont.dataset.notepadInit)initNotepad(cont);else if(app==='paint'&&!cont.dataset.paintInit)initPaint(cont);else if(app==='clock')initClockApp();else if(app==='terminal'){focusTerminalInput();if(!cont.dataset.termInit)initTerminal(cont);}else if(app==='controlpanel'&&!cont.dataset.cpInit)initControlPanel(cont);else if(app==='filemanager'&&!cont.dataset.fmInit)initFileManager(cont);else if(app==='progman')initProgramManager(cont);},50);};

        document.addEventListener('click',e=>{if(!e.target.closest('.menu-item'))document.querySelectorAll('.dropdown-menu.show').forEach(d=>d.classList.remove('show'));});
        window.addEventListener('resize',()=>{if(screenSaverActive){const c=document.getElementById('screensaver-canvas');c.width=window.innerWidth;c.height=window.innerHeight;}});
        window.addEventListener('beforeunload',()=>saveSettings());
        console.log('Bulb 1.0 <br> For Testing Purposes Only. Evaluation Copy.');
    </script>
</body>
</html>
